<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background: Morandi blue (海珘) -->
  <rect width="100" height="100" rx="18" fill="#A8BCCA"/>

  <!-- Roots -->
  <path d="M50 78 L50 91" stroke="#7A6E62" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M49 82 Q41 86 34 90" stroke="#7A6E62" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M49 85 Q43 89 38 94" stroke="#7A6E62" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <path d="M51 82 Q59 86 66 90" stroke="#7A6E62" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M51 85 Q57 89 62 94" stroke="#7A6E62" stroke-width="1.1" stroke-linecap="round" fill="none"/>

  <!-- Trunk -->
  <path d="M47 78 Q47.5 66 50 56 Q52.5 66 53 78 Z" fill="#7A6E62"/>

  <!-- Branches -->
  <path d="M50 68 Q40 60 28 54" stroke="#7A6E62" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M50 68 Q60 60 72 54" stroke="#7A6E62" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M50 62 Q43 52 34 46" stroke="#7A6E62" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M50 62 Q57 52 66 46" stroke="#7A6E62" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M50 57 Q50 47 50 37" stroke="#7A6E62" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Five foliage clusters — back layer -->
  <circle cx="50"  cy="29"  r="11"  fill="#6E9478" opacity="0.72"/>
  <circle cx="28"  cy="48"  r="9"   fill="#6E9478" opacity="0.68"/>
  <circle cx="72"  cy="48"  r="9"   fill="#6E9478" opacity="0.68"/>
  <circle cx="34"  cy="39"  r="8"   fill="#6E9478" opacity="0.63"/>
  <circle cx="66"  cy="39"  r="8"   fill="#6E9478" opacity="0.63"/>

  <!-- Five foliage clusters — front layer (lighter sage) -->
  <circle cx="50"  cy="26"  r="9"   fill="#9AB8A2" opacity="0.82"/>
  <circle cx="28"  cy="46"  r="7.5" fill="#9AB8A2" opacity="0.78"/>
  <circle cx="72"  cy="46"  r="7.5" fill="#9AB8A2" opacity="0.78"/>
  <circle cx="35"  cy="37"  r="6.5" fill="#9AB8A2" opacity="0.72"/>
  <circle cx="65"  cy="37"  r="6.5" fill="#9AB8A2" opacity="0.72"/>

  <!-- Five buds — dusty pink (丹缃) one per cluster -->
  <circle cx="50"  cy="18"  r="3.0" fill="#E0B8AC"/>
  <circle cx="21"  cy="44"  r="2.5" fill="#E0B8AC"/>
  <circle cx="79"  cy="44"  r="2.5" fill="#E0B8AC"/>
  <circle cx="29"  cy="33"  r="2.2" fill="#E0B8AC"/>
  <circle cx="71"  cy="33"  r="2.2" fill="#E0B8AC"/>

</svg>
